default:
  image: quay.io/sisense/node:18.16.0-slim
  tags:
    - k8s
  before_script:
    - yarn --version
    # These directories _might_ be restored (not guaranteed) from a previously created cache.
    #
    # These directories are restored from a previous cache when this Job is running on a
    # GitLab Runner that has already has a cache for our configured cache key.
    #
    # For transparency, always print out how many subdirectories are in these directories,
    # so that it is obvious in the GitLab logs whether this Job ran with these files initially
    # restored from a cache or not.
    - '(ls .yarn/cache || true) | wc -l'

variables:
  NX_REJECT_UNKNOWN_LOCAL_CACHE: '0'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_KIND == "csdk-slack"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

.install_git: &install_git |-
  if ! command -v git &> /dev/null; then
    apt-get update && apt-get install -y git
  fi

.configure_git: &configure_git |-
  echo 'Git client is being configured...'
  git remote set-url origin "https://${GL_RELEASE_BOT_USER_NAME}:${GITLAB_TOKEN}@gitlab.rnd.sisense.com/${CI_PROJECT_PATH}.git"
  git config user.name "${GL_RELEASE_BOT_USER_NAME}"
  git config user.email "${GL_RELEASE_BOT_USER_EMAIL}"
  git config --add push.pushOption ci.skip
  git fetch
  git checkout --force -B "${CI_COMMIT_REF_NAME}" "origin/${CI_COMMIT_REF_NAME}"
  git reset --hard
  git clean -fd
  git status
  echo 'Git client is configured successfully'

stages:
  - notify
  - install
  - validate
  - build
  - verify
  - test
  - publish
  - external
  - security

.nx_cache: &nx_cache
  key:
    files:
      - 'nx.json'
      - 'yarn.lock'
    prefix: 'NX'
  paths:
    - '.nx/'
    - 'packages/sdk-ui-angular/src/version.ts'
    - 'packages/sdk-cli/src/package-version.ts'
  policy: pull

.nx_dependencies_cache: &nx_dependencies_cache
  key:
    files:
      - yarn.lock
    prefix: 'DEPENDENCIES'
  paths:
    - .yarn/
    - '**/node_modules/'
  policy: pull

install:
  stage: install
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull-push
  script:
    - yarn install --immutable
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

build:
  stage: build
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull-push
  needs:
    - job: install
  script:
    - yarn nx run @sisense/sdk-cli:prebuild
    - yarn nx run @sisense/sdk-ui-angular:sync-version
    - yarn nx:build:prod
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

format:
  stage: validate
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
  script:
    - yarn nx:format:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

lint:
  stage: verify
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull
  needs:
    - job: build
      optional: true
  script:
    - yarn nx:lint --quiet
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

public-api-check:
  stage: verify
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
  needs:
    - job: install
  script:
    - yarn public-api-check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success

unit-tests:
  stage: test
  interruptible: true
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull
    - key: 'UNIT_TESTS_$CI_COMMIT_REF_NAME'
      paths:
        - '.nx/'
      policy: pull-push
  needs:
    - job: build
      optional: true
  coverage: /Branches\s*:\s*([^%]+)/
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - .nyc_output/
      - coverage/
    expire_in: 3 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "external-main"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  script:
    - yarn nx nx:test:coverage:collect:report

lint-commits:
  stage: validate
  needs: []
  script:
    - ./ci/lint_commits.sh
  rules:
    - if: $CI_COMMIT_AUTHOR == "svc_whitesource <svc_whitesource@sisense.com>"
      when: never
    - if: $CI_COMMIT_BRANCH == "external-main"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

mr_board_to_slack:
  stage: notify
  needs: []
  allow_failure: true
  script:
    - echo "SOURCE=$CI_PIPELINE_SOURCE"
    - echo "SCHEDULE_KIND=$SCHEDULE_KIND"
    - node scripts/get-mrs.cjs
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_KIND == "csdk-slack"

audit:
  stage: validate
  cache:
    - <<: *nx_dependencies_cache
  rules:
    - if: $CI_COMMIT_BRANCH == "external-main"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  script:
    - yarn npm audit --environment production

component-tests:
  stage: test
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull
    - key: 'COMPONENTS_TESTS_$CI_COMMIT_REF_NAME'
      paths:
        - '.nx/'
      policy: pull-push
  needs:
    - job: build
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "external-main"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      allow_failure: true
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip-components-tests_MAINTAINERS_ONLY/'
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  image: mcr.microsoft.com/playwright:v1.44.1-jammy
  script:
    # check for skip label
    - |
      if [[ "$CI_MERGE_REQUEST_LABELS" =~ skip-components-tests_MAINTAINERS_ONLY ]]; then
        echo "Skipping component-tests due to MR label skip-components-tests_MAINTAINERS_ONLY"
        exit 1
      fi
    # normal execution
    - yarn nx run @sisense/e2e:components:test
    - mkdir -p public/$CI_PIPELINE_ID
    - mv e2e/playwright-report/* public/$CI_PIPELINE_ID/
    - ls -l public
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
      - e2e/results.xml
      - public
    reports:
      junit: e2e/results.xml
    expire_in: 1 week

visual-regression-tests:
  stage: test
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull
    - key: 'VISUAL_REGRESSION_TESTS_$CI_COMMIT_REF_NAME'
      paths:
        - '.nx/'
      policy: pull-push
  needs:
    - job: build
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "external-main"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      allow_failure: true
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip-visual-regression-tests_MAINTAINERS_ONLY/'
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  image: mcr.microsoft.com/playwright:v1.44.1-jammy
  script:
    # check for skip label
    - |
      if [[ "$CI_MERGE_REQUEST_LABELS" =~ skip-visual-regression-tests_MAINTAINERS_ONLY ]]; then
        echo "Skipping visual-regression-tests due to MR label skip-visual-regression-tests_MAINTAINERS_ONLY"
        exit 1
      fi
    # normal execution
    - yarn nx:build:prod
    - yarn nx run @sisense/e2e:playwright-test
  artifacts:
    when: always
    paths:
      - e2e/playwright-report
      - e2e/test-results
      - e2e/results.xml
    reports:
      junit: e2e/results.xml
    expire_in: 1 week

docs-check:
  stage: verify
  cache:
    - <<: *nx_dependencies_cache
      policy: pull
    - <<: *nx_cache
      policy: pull
  needs:
    - job: build
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == "external-main"
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: on_success
  script:
    - *install_git
    - yarn nx run @sisense/root:docs:gen:md
    - yarn nx run @sisense/root:docs:check:md

.configure_npm_registry_for_local_release: &configure_npm_registry_for_local_release |-
  echo 'NPM registry is being configured...'
  yarn config set npmScopes.sisense.npmAlwaysAuth true
  yarn config set npmScopes.sisense.npmPublishRegistry "${NPM_REGISTRY_URL}"
  yarn config set npmScopes.sisense.npmRegistryServer "${NPM_REGISTRY_URL}"
  yarn config set npmScopes.sisense.npmAuthToken "${NPM_TOKEN_}"
  echo 'NPM registry is configured successfully'

version-and-publish-to-local-npm:
  stage: publish
  when: manual
  cache:
    - <<: *nx_dependencies_cache
    - <<: *nx_cache
  needs:
    - job: build
      optional: true
  before_script:
    - *install_git
    - *configure_git
    - *configure_npm_registry_for_local_release
  script:
    - yarn version-and-publish "${BUMP_STRATEGY}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH =~ /^v[0-9]+\.x$/'

push-to-github:
  stage: external
  when: manual
  script:
    - *install_git
    - *configure_git
    - yarn install --immutable
    - ./ci/sync-gitlab-to-github.sh
  variables:
    GITHUB_URL: git@github.com:sisense/compose-sdk-monorepo.git
  rules:
    - if: '$CI_COMMIT_BRANCH == "external-main"'
    - if: '$CI_COMMIT_BRANCH =~ /^external-v[0-9]+\.x$/'

.configure_git_for_local_release: &configure_git_for_local_release |-
  echo 'Git client is being configured...'
  git remote set-url origin "https://${GL_RELEASE_BOT_USER_NAME}:${GITLAB_TOKEN}@gitlab.rnd.sisense.com/${CI_PROJECT_PATH}.git"
  git config user.name "${GL_RELEASE_BOT_USER_NAME}"
  git config user.email "${GL_RELEASE_BOT_USER_EMAIL}"
  git fetch origin  # Fetch all branches from origin
  git fetch origin master --unshallow  # Ensure full history for master
  git checkout -B $CI_COMMIT_REF_NAME origin/$CI_COMMIT_REF_NAME  # Check out the branch being built
  git branch --set-upstream-to=origin/master  # Set upstream to origin/master
  git status
  echo 'Git client is configured successfully'

prerelease:
  stage: publish
  when: manual
  cache:
    - <<: *nx_dependencies_cache
    - <<: *nx_cache

  script:
    - *install_git
    - *configure_git_for_local_release
    - *configure_npm_registry_for_local_release
    - yarn workspaces foreach --since --recursive --no-private version prerelease --deferred
    - yarn version apply --all --prerelease="alpha-${CI_COMMIT_SHORT_SHA}"
    - yarn nx:build:prod
    - yarn workspace @sisense/sdk-ui-preact publish:prepare
    - yarn workspaces foreach --since --no-private npm publish --tolerate-republish --tag alpha
    - echo 'The following prerelease versions have been published:'
    - yarn workspaces foreach --since --recursive --no-private exec node -p "require('./package.json').name + ' - ' + require('./package.json').version"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: never
    - if: '$CI_COMMIT_BRANCH =~ /^v[0-9]+\.x$/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - when: manual

release-fusion-version:
  stage: publish
  when: manual
  cache:
    - <<: *nx_dependencies_cache
    - <<: *nx_cache

  before_script:
    - *install_git
    - *configure_git_for_local_release
    - *configure_npm_registry_for_local_release
    - apt-get update && apt-get install -y --no-install-recommends jq

  script:
    - ./ci/release-fusion-version.sh

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH =~ /^v[0-9]+\.x$/'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/\w{1}\d{4}\.\d{1,2}\.\d{1,}$/'
